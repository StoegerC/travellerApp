<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traveller – Admin</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 24px; background: #f4f5f7; color: #1a1a2e;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #16161e; color: #e8e8f0; }
    .panel { background: #22222e !important; border-color: #333 !important; }
    input, select { background: #16161e !important; color: #e8e8f0 !important; border-color: #444 !important; }
    table { border-color: #333 !important; }
    th, td { border-color: #333 !important; }
  }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  .subtitle { color: #888; margin: 0 0 24px; font-size: 0.9rem; }
  .panel {
    background: #fff; border: 1px solid #ddd; border-radius: 10px;
    padding: 20px; max-width: 720px; margin: 0 0 20px;
  }
  .form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
  label { font-size: 0.85rem; font-weight: 600; }
  input, select {
    padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;
    min-height: 44px; box-sizing: border-box;
  }
  button {
    padding: 10px 16px; border: none; border-radius: 6px; font-size: 0.95rem;
    cursor: pointer; min-height: 44px;
  }
  .btn-primary { background: #667eea; color: white; }
  .btn-danger  { background: #e74c3c; color: white; }
  .btn-secondary { background: #ddd; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
  .role-tag {
    display: inline-block; background: #667eea22; color: #667eea; border: 1px solid #667eea55;
    border-radius: 4px; padding: 1px 6px; font-size: 0.75rem; margin-right: 4px;
  }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .stat-card { background: #f9f9fb; border-radius: 8px; padding: 12px; }
  @media (prefers-color-scheme: dark) { .stat-card { background: #1a1a24; } }
  .stat-value { font-size: 1.4rem; font-weight: 700; }
  .stat-label { font-size: 0.8rem; color: #888; }
  .error { color: #e74c3c; font-size: 0.9rem; }
  .hidden { display: none; }
  .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .row-actions button { padding: 4px 8px; min-height: unset; font-size: 0.8rem; }
</style>
</head>
<body>

  <div id="loginView" class="panel">
    <h1>Traveller – Admin</h1>
    <p class="subtitle">Nur für Accounts mit Administrator-Rolle.</p>
    <div class="form-row">
      <div class="form-group">
        <label>Server-URL</label>
        <input type="url" id="adminUrl" placeholder="https://macbook.tailXXXX.ts.net">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="adminEmail" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" id="adminPassword" autocomplete="current-password" minlength="8">
      </div>
    </div>
    <button class="btn-primary" id="loginBtn">Anmelden</button>
    <p class="error" id="loginError"></p>
  </div>

  <div id="mainView" class="hidden">
    <h1>Traveller – Admin</h1>
    <p class="subtitle" id="welcomeText"></p>

    <div class="panel">
      <h2>Server-Statistik</h2>
      <div class="stat-grid" id="statsGrid"><p>Lade …</p></div>
    </div>

    <div class="panel">
      <h2>Nutzer</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Neue E-Mail</label>
          <input type="email" id="newUserEmail">
        </div>
        <div class="form-group">
          <label>Rollen</label>
          <select id="newUserRoles" multiple size="2">
            <option value="gm">Meister</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="createUserBtn">Nutzer anlegen</button>
      <p class="error" id="userError"></p>
      <table>
        <thead><tr><th>E-Mail</th><th>Rollen</th><th>Passwort</th><th>Aktionen</th></tr></thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>

    <button class="btn-secondary" id="logoutBtn">Abmelden</button>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
